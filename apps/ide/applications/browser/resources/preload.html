<!DOCTYPE html>
<html lang="en">

<head>
    <style>
        html,
        body {
            background-color: oklch(18% 0.015 260);
        }

        .theia-preload {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-image: none;
        }

        .theia-preload::after {
            /* remove default loading animation */
            content: none;
        }

        .spinner-container {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            width: 100vw;
            color: oklch(100% 0 0);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
        }

        .custom-spinner {
            display: block;
        }

        .studentide-preload-logo {
            color: oklch(100% 0 0);
            font-size: 1.75rem;
            font-weight: 700;
            letter-spacing: -0.055em;
            line-height: 1;
        }

        .studentide-preload-logo span {
            color: oklch(55% 0.2 270);
        }
    </style>
</head>

<body>
    <div class='spinner-container'>
        <div class='custom-spinner'>
            <div class='studentide-preload-logo'>student<span>ide_</span></div>
        </div>
    </div>

    <script>
        if (document.head) {
            let link = document.createElement('link');
            link.rel = 'icon';
            link.href = '/favicon.ico';
            document.head.appendChild(link);
        }
    </script>
</body>

</html>
