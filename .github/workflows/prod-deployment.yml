name: Production Deployment
on: 
  push:
    branches:
      - main

jobs:
  Production-Deployment:
    runs-on: ubuntu-24.04-arm
    permissions:
      id-token: write
      contents: read
    env: 
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

    steps:
      - name: Check out repository code
        uses: actions/checkout@v6

      - name: Configure AWS Credentials
        id: aws-login
        uses: aws-actions/configure-aws-credentials@v6
        with:
            role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
            aws-region: us-east-2

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install Dependencies 
        run: bun install --filter "!./apps/ide"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Deploy Infra 
        run: bunx turbo deploy
        env:
          AwsRegion: us-east-2
          CDK_DEFAULT_REGION: us-east-2
          CDK_DEFAULT_ACCOUNT: ${{ steps.aws-login.outputs.aws-account-id }}
          
          # Your existing secrets
          CLOUDFLARE_ZONE_ID: ${{ secrets.CLOUDFLARE_ZONE_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          AWS_IDE_STATUS_WEBHOOK_SECRET: ${{ secrets.AWS_IDE_STATUS_WEBHOOK_SECRET }}
          IDE_STATUS_WEBHOOK_URL: ${{ secrets.IDE_STATUS_WEBHOOK_URL }}
    
      - name: Sync CDK outputs to Vercel env
        working-directory: apps/infra
        run: bash ../../.github/workflows/scripts/cdk-out-to-env.bash

      - name: Run Database Migrations
        run: bunx turbo db:migrate
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}

      - name: Vercel Deployment
        working-directory: apps/web
        run: |
          bunx vercel pull --yes --environment=production --token "$VERCEL_TOKEN"
          bunx vercel env pull .env.production.local --environment=production --yes --token "$VERCEL_TOKEN"
          mkdir -p .vercel
          cp .env.production.local .vercel/.env.production.local
          github_secret_env=(
            DATABASE_URL
            BETTER_AUTH_URL
            NEXT_PUBLIC_BETTER_AUTH_URL
            BETTER_AUTH_SECRET
            GITHUB_CLIENT_ID
            GITHUB_CLIENT_SECRET
            GOOGLE_CLIENT_ID
            GOOGLE_CLIENT_SECRET
            STRIPE_SECRET_KEY
            STRIPE_WEBHOOK_SECRET
          )
          for key in "${github_secret_env[@]}"; do
            if [ -n "${!key:-}" ]; then
              for env_file in .env.production.local .vercel/.env.production.local; do
                sed -i "/^${key}=/d" "$env_file"
                printf '%s=%s\n' "$key" "${!key}" >> "$env_file"
              done
            fi
          done
          required_env=(
            DATABASE_URL
            BETTER_AUTH_URL
            NEXT_PUBLIC_BETTER_AUTH_URL
            BETTER_AUTH_SECRET
            GITHUB_CLIENT_ID
            GITHUB_CLIENT_SECRET
            GOOGLE_CLIENT_ID
            GOOGLE_CLIENT_SECRET
            STRIPE_SECRET_KEY
            STRIPE_WEBHOOK_SECRET
            AwsRegion
            AwsS3AccessKeyId
            AwsS3SecretAccessKey
            AwsS3BucketName
            AwsIdeStatusWebhookSecret
            EfsFilesystemId
            EcsClusterName
            EcsSubnets
            EcsSecurityGroup
            S3ArchiverTaskDefinitionArn
          )
          missing_env=()
          for key in "${required_env[@]}"; do
            value="$(grep -E "^${key}=" .vercel/.env.production.local | tail -n 1 | cut -d= -f2- || true)"
            value="${value%\"}"
            value="${value#\"}"
            if [ -z "$value" ]; then
              missing_env+=("$key")
            fi
          done
          if [ "${#missing_env[@]}" -gt 0 ]; then
            printf 'Missing or empty Vercel production env vars:\n'
            printf ' - %s\n' "${missing_env[@]}"
            exit 1
          fi
          bunx vercel build --prod --token "$VERCEL_TOKEN"
          bunx vercel deploy --prebuilt --prod --token "$VERCEL_TOKEN"
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          BETTER_AUTH_URL: ${{ secrets.BETTER_AUTH_URL }}
          NEXT_PUBLIC_BETTER_AUTH_URL: ${{ secrets.NEXT_PUBLIC_BETTER_AUTH_URL }}
          BETTER_AUTH_SECRET: ${{ secrets.BETTER_AUTH_SECRET }}
          GITHUB_CLIENT_ID: ${{ secrets.GITHUB_CLIENT_ID }}
          GITHUB_CLIENT_SECRET: ${{ secrets.GITHUB_CLIENT_SECRET }}
          GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
          GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}
          STRIPE_SECRET_KEY: ${{ secrets.STRIPE_SECRET_KEY }}
          STRIPE_WEBHOOK_SECRET: ${{ secrets.STRIPE_WEBHOOK_SECRET }}
