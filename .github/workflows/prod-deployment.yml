name: Production Deployment
on: 
  push:
    branches:
      - main
jobs:
  Production-Deployment:
    runs-on: ubuntu-latest
    permissions:
      id-token: write # This is required for requesting the JWT
      contents: read  # This is required for actions/checkout
    env: 
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

    steps:
      - name: Check out repository code
        uses: actions/checkout@v6

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
            role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
            aws-region: us-east-2

      - uses: oven-sh/setup-bun@v2

      - name: Install Dependencies 
        run: bun install

      - name: Deploy Infra 
        run: turbo deploy
    
      - name: Sync CDK outputs to Vercel env
        working-directory: apps/infra
        run: bash ../../.github/workflows/scripts/cdk-out-to-env.bash

      - name: Run Database Migrations
        run: turbo db:migrate
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}

      - name: Vercel Deployment
        run: |
          bunx vercel pull --yes --environment=production --token ${{ secrets.VERCEL_TOKEN }}
          bunx vercel build --prod --token ${{ secrets.VERCEL_TOKEN }}
          bunx vercel deploy --prebuilt --prod --token ${{ secrets.VERCEL_TOKEN }}
